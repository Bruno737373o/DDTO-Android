name: Build Android DDTO (Final Fix)
on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: true

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Haxe
        uses: krdlab/setup-haxe@v1
        with:
          haxe-version: 4.2.5

      - name: Install Libraries
        run: |
          haxelib setup ~/haxelib
          
          # Força o Git a usar o token do GitHub Actions para qualquer clone (Resolve erro 128)
          git config --global url."https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/".insteadOf "https://github.com/"

          # Bibliotecas padrão
          haxelib install lime 8.1.2 --always --quiet
          haxelib install openfl 9.3.3 --always --quiet
          haxelib install flixel 5.5.0 --always --quiet
          haxelib install flixel-tools --always --quiet
          haxelib install flixel-ui --always --quiet
          haxelib install flixel-addons --always --quiet
          haxelib install tjson --always --quiet
          haxelib install hxvlc --always --quiet
          haxelib install actuate --always --quiet
          haxelib install hxcpp --always --quiet

          # Tentativa de clone com o token injetado
          git clone --depth 1 https://github.com/Tandem-Yug/faxe.git ~/haxelib/faxe/git
          haxelib dev faxe ~/haxelib/faxe/git

          git clone --depth 1 https://github.com/larsiusprime/polymod.git ~/haxelib/polymod/git
          haxelib dev polymod ~/haxelib/polymod/git

          git clone --depth 1 https://github.com/Aidan63/linc_discord-rpc.git ~/haxelib/discord_rpc/git
          haxelib dev discord_rpc ~/haxelib/discord_rpc/git

          git clone --depth 1 https://github.com/MAJ0R-Z/extension-androidtools.git ~/haxelib/extension-androidtools/git
          haxelib dev extension-androidtools ~/haxelib/extension-androidtools/git

          git clone --depth 1 https://github.com/nebulazorua/linc_luajit.git ~/haxelib/linc_luajit/git
          haxelib dev linc_luajit ~/haxelib/linc_luajit/git

      - name: Configure Android
        run: |
          haxelib run lime setup -alias -y
          haxelib run lime setup android "${{ github.workspace }}" "${{ steps.setup-java.outputs.path }}" "$ANDROID_SDK_ROOT" "$ANDROID_NDK_LATEST_HOME"
          haxelib run lime config ANDROID_SDK $ANDROID_SDK_ROOT
          haxelib run lime config ANDROID_NDK_ROOT $ANDROID_NDK_LATEST_HOME
          haxelib run lime config JAVA_HOME $JAVA_HOME

      - name: Build Android
        run: haxelib run lime build android -release

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: DDTO-Plus-Android-Build
          path: export/release/android/bin/app/build/outputs/apk/release/*.apk
          
